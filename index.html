    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #62708a;
        --blue: #0969da;
        --line: #cfd8e6;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px 16px;
        background: radial-gradient(circle at 18% 12%, rgba(9, 105, 218, 0.12), transparent 34%), #f5f7fb;
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(760px, 100%);
        padding: clamp(24px, 5vw, 48px);
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 22px 70px rgba(23, 32, 51, 0.12);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--blue);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 7vw, 56px);
        line-height: 1.05;
      }

      .subtitle { margin: 12px 0 26px; color: var(--muted); font-size: 17px; }
      .table-wrap { overflow: hidden; border: 1px solid var(--line); border-radius: 14px; }
      table { width: 100%; border-collapse: collapse; background: white; }
      th, td { padding: 12px 16px; border-bottom: 1px solid var(--line); text-align: left; }
      th { background: #eef4fc; color: #31415e; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
      tr:last-child td { border-bottom: 0; }
      th:last-child, td:last-child { width: 34%; border-left: 1px solid var(--line); }

      .open-report {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 22px;
        color: var(--muted);
        font-size: 14px;
      }

      .open-report p { margin: 0; }
      .open-report a { margin-left: auto; color: var(--blue); font-weight: 700; text-decoration: none; }
      .open-report a:hover, .open-report a:focus-visible { text-decoration: underline; }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #c9d7ea;
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 520px) {
        main { border-radius: 18px; }
        th, td { padding: 10px; font-size: 13px; }
        .open-report { flex-wrap: wrap; }
        .open-report a { width: 100%; margin-left: 26px; }
      }

      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    </style>
